server.port=8080
services.projects.url=http://localhost:8081/api/projects
services.resources.url=http://localhost:8082/api/resources
services.analytics.url=http://localhost:8083/api/analytics

# Circuit Breaker: configuracion comun para los tres microservicios.
resilience4j.circuitbreaker.configs.default.registerHealthIndicator=true
resilience4j.circuitbreaker.configs.default.slidingWindowSize=5
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=2

resilience4j.circuitbreaker.instances.projectsService.baseConfig=default
resilience4j.circuitbreaker.instances.resourcesService.baseConfig=default
resilience4j.circuitbreaker.instances.analyticsService.baseConfig=default

management.endpoints.web.exposure.include=health,circuitbreakers
